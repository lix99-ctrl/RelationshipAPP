                      key={cat}
                      onClick={() => { setActiveCategory(cat); setCurrentCardIndex(0); setIsFlipped(false); }}
                      className={`flex-1 px-2.5 py-1.5 rounded-lg text-center whitespace-nowrap transition-all duration-200 ${isActive ? 'bg-stone-800 text-stone-100 font-semibold border border-stone-700/50 shadow-md' : 'text-stone-500 hover:text-stone-400'}`}
                    >
                      {cat}
                    </button>
                  );
                })}
              </div>
            )}

            <div onClick={() => { setIsFlipped(!isFlipped); triggerHaptic(10); playSound('flip'); }} className="w-full aspect-[3/4] cursor-pointer mb-5 perspective-1000 select-none">
              <div className={`w-full h-full relative transition-transform duration-500 preserve-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                <div className="absolute inset-0 w-full h-full backface-hidden border border-stone-800 rounded-2xl bg-stone-950 p-4 flex flex-col justify-between shadow-xl">
                  <div className="w-full h-52 rounded-xl overflow-hidden border border-stone-800/40 bg-stone-900 flex items-center justify-center">
                    <CodeIllustration category={currentCard.category} id={currentCard.id} />
                  </div>
                  <div className="text-center pb-2">
                    <span className={`text-[8px] tracking-widest uppercase font-mono px-2 py-0.5 rounded border mb-2 inline-block ${
                      currentCard.category === 'Spicy' || currentCard.category === 'Midnight Express' ? 'bg-rose-950/30 text-rose-400 border-rose-900/40' : 
                      currentCard.category === 'Mild' || currentCard.category === 'Slow Burn' ? 'bg-emerald-950/30 text-emerald-400 border-emerald-900/40' : 
                      currentCard.category === 'Wildcards' ? 'bg-purple-950/30 text-purple-400 border-purple-900/40' : 
                      'bg-sky-950/30 text-sky-400 border-sky-900/40'
                    }`}>
                      {currentCard.category}
                    </span>
                    <p className="text-base text-stone-200 font-serif font-bold mb-1 tracking-wide">{currentCard.title}</p>
                    <p className="text-[9px] text-stone-600 tracking-widest uppercase font-mono">Tap Card to Flip</p>
                  </div>
                </div>

                <div className="absolute inset-0 w-full h-full backface-hidden rotate-y-180 border border-stone-800 rounded-2xl bg-stone-950 p-5 flex flex-col justify-between shadow-xl">
                  <div>
                    <div className="flex justify-between items-center mb-4 border-b border-stone-900 pb-2">
                      <span className="text-[8px] text-stone-500 font-bold uppercase tracking-widest font-mono">Action Instructions</span>
                      <span className="text-[9px] text-stone-600 font-mono font-bold">CARD #{String(currentCard.id).padStart(3, '0')}</span>
                    </div>
                    <h3 className="text-lg font-serif font-bold text-stone-100 mb-2.5 leading-tight">{currentCard.title}</h3>
                    <p className="text-xs text-stone-300 leading-relaxed font-sans font-normal tracking-wide">{currentCard.text}</p>
                  </div>
                  <div className="bg-stone-900/90 border border-stone-800/60 p-3.5 rounded-xl">
                    <span className="text-[8px] text-stone-400 font-bold block mb-1 tracking-widest font-mono uppercase">ALIGNMENT TIP</span>
                    <p className="text-[11px] text-stone-500 leading-normal italic font-sans">{currentCard.tip}</p>
                  </div>
                </div>
              </div>
            </div>

            <button
              onClick={(e) => { e.stopPropagation(); handleNextCard(); }}
              className="w-full bg-stone-100 text-stone-900 font-semibold py-3.5 rounded-xl text-xs tracking-widest uppercase font-mono shadow-xl hover:bg-stone-200 transition-all active:scale-[0.99]"
            >
              Next Card
            </button>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
